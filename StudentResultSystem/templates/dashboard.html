<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Student Result Dashboard</h2>

<!-- Add Student Form -->

<div class="card p-4 mb-4 shadow">

<h4>Add Student Result</h4>

<form action="/add" method="post">

<div class="row g-2">

<div class="col">
<input class="form-control" name="name" placeholder="Name" required>
</div>

<div class="col">
<input class="form-control" name="roll" placeholder="Roll Number" required>
</div>

<div class="col">
<input class="form-control" name="subject1" placeholder="Subject 1" type="number" required>
</div>

<div class="col">
<input class="form-control" name="subject2" placeholder="Subject 2" type="number" required>
</div>

<div class="col">
<input class="form-control" name="subject3" placeholder="Subject 3" type="number" required>
</div>

<div class="col">
<button type="submit" class="btn btn-success w-100">Add</button>
</div>

</div>

</form>

</div>


<!-- Student Table -->

<div class="card p-4 shadow">

<table class="table table-bordered table-striped text-center">

<thead class="table-dark">

<tr>
<th>Name</th>
<th>Roll</th>
<th>Sub1</th>
<th>Sub2</th>
<th>Sub3</th>
<th>Total</th>
<th>%</th>
<th>Grade</th>
</tr>

</thead>

<tbody>

{% for s in students %}

<tr>

<td>{{ s['name'] }}</td>
<td>{{ s['roll'] }}</td>
<td>{{ s['subject1'] }}</td>
<td>{{ s['subject2'] }}</td>
<td>{{ s['subject3'] }}</td>
<td>{{ s['total'] }}</td>
<td>{{ s['percentage'] }}</td>
<td>{{ s['grade'] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>


<!-- Graph Section -->

<div class="card p-4 mt-5 shadow">

<h4 class="text-center">Student Performance Graph</h4>

<canvas id="performanceChart"></canvas>

</div>

</div>


<script>

const studentNames = [
{% for s in students %}
"{{ s['name'] }}",
{% endfor %}
];

const studentMarks = [
{% for s in students %}
{{ s['percentage'] }},
{% endfor %}
];

const ctx = document.getElementById('performanceChart').getContext('2d');

new Chart(ctx, {
type: 'bar',

data: {
labels: studentNames,

datasets: [{
label: 'Student Percentage',
data: studentMarks,
borderWidth: 1
}]
},

options: {
responsive: true,

scales: {
y: {
beginAtZero: true,
max: 100
}
}
}

});

</script>

</body>
</html>
