<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#43e97b,#38f9d7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial, sans-serif;
}

.card{
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="card p-4 text-center shadow" style="width:350px">

<h3 class="mb-4">📊 Student Result</h3>

{% if student %}

<p><strong>Name:</strong> {{ student['name'] }}</p>
<p><strong>Roll:</strong> {{ student['roll'] }}</p>

<hr>

<p>Subject 1: {{ student['subject1'] }}</p>
<p>Subject 2: {{ student['subject2'] }}</p>
<p>Subject 3: {{ student['subject3'] }}</p>

<hr>

<h4>Total: {{ student['total'] }}</h4>

<a href="/" class="btn btn-primary mt-3">Back</a>

{% else %}

<h4>❌ Student Not Found</h4>

<a href="/" class="btn btn-primary mt-3">Go Back</a>

{% endif %}

</div>

</body>
</html>
